<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exploding Dinos</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Nederlandse dino-editie</p>
          <h1>Exploding Dinos</h1>
        </div>
        <div class="status-pill" id="turnStatus">Jouw beurt</div>
      </section>

      <section class="table">
        <div class="opponent-zone">
          <div class="opponents" id="opponents"></div>
        </div>

        <div class="center-zone">
          <button class="deck" id="drawButton" type="button">
            <span class="deck-count" id="deckCount">0</span>
            <span>Trek kaart</span>
          </button>

          <div class="discard">
            <span>Aflegstapel</span>
            <strong id="discardTop">Nog leeg</strong>
          </div>
        </div>

        <div class="player-zone">
          <div class="player-label">
            <span>Jij</span>
            <strong id="playerHint">Speel een kaart of trek</strong>
          </div>
          <div class="hand" id="playerHand"></div>
        </div>
      </section>

      <aside class="side-panel">
        <div class="panel-section">
          <h2>Actie</h2>
          <p id="actionText">Welkom bij de eerste speelbare versie.</p>
          <label class="setup-control" for="opponentCount">
            <span>Tegenspelers</span>
            <select id="opponentCount">
              <option value="1">1 pc</option>
              <option value="2">2 pc's</option>
              <option value="3">3 pc's</option>
              <option value="4">4 pc's</option>
            </select>
          </label>
          <button id="newGameButton" type="button">Nieuw spel</button>
        </div>

        <div class="panel-section">
          <h2>Logboek</h2>
          <ol class="log" id="gameLog"></ol>
        </div>
      </aside>

      <section class="draw-reveal is-hidden" id="drawReveal" aria-live="polite">
        <div class="draw-reveal__panel">
          <p class="eyebrow" id="revealEyebrow">Kaart getrokken</p>
          <div class="draw-reveal__card" id="revealCard"></div>
          <p class="draw-reveal__text" id="revealText"></p>
          <div class="placement is-hidden" id="placementControls">
            <label for="placementSelect">Geheime plek in de trekstapel</label>
            <select id="placementSelect"></select>
            <p class="placement__hint" id="placementHint"></p>
          </div>
          <div class="reveal-actions">
            <button id="revealButton" type="button">Verder</button>
            <button class="secondary-action is-hidden" id="revealSecondaryButton" type="button">Laat doorgaan</button>
          </div>
        </div>
      </section>
    </main>

    <script src="src/cards.js"></script>
    <script src="src/players.js"></script>
    <script src="game.js"></script>
  </body>
</html>
