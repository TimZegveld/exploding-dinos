services:
  - type: web
    name: exploding-dinos-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/server.js
    healthCheckPath: /api/health
    envVars:
      - key: ALLOWED_ORIGIN
        value: https://timzegveld.github.io
      - key: ROOM_STORE
        value: redis
      - key: REDIS_URL
        sync: false
